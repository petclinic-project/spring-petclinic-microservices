name: Build and Push Microservices

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  discover-services:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read services config
        id: set-matrix
        run: |
          MATRIX=$(jq -c . .github/config/services.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build-and-push:
    needs: discover-services
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover-services.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::482352877891:role/GitHubActionsECRPushRole
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven module
        run: |
          ./mvnw clean package \
            -pl ${{ matrix.service.module }} \
            -am \
            -DskipTests

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cp ${{ matrix.service.module }}/target/*.jar .

          docker build \
            -f docker/Dockerfile \
            --build-arg ARTIFACT_NAME=$(basename *.jar .jar) \
            --build-arg EXPOSED_PORT=${{ matrix.service.port }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

      - name: Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
